<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="afsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06101e"/>
      <stop offset="40%" stop-color="#0e2244"/>
      <stop offset="75%" stop-color="#1a4a70"/>
      <stop offset="100%" stop-color="#206888"/>
    </linearGradient>
    <linearGradient id="afsea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5878"/>
      <stop offset="100%" stop-color="#06101c"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#afsky)"/>

  <!-- Moon -->
  <circle cx="650" cy="100" r="32" fill="#f0e8c0" opacity="0.9"/>
  <circle cx="650" cy="100" r="24" fill="#fffbe8"/>

  <!-- Stars -->
  <g fill="#e8f0ff" opacity="0.55">
    <circle cx="50" cy="45" r="1.5"/><circle cx="130" cy="22" r="1"/><circle cx="250" cy="60" r="2"/>
    <circle cx="380" cy="30" r="1"/><circle cx="480" cy="55" r="1.5"/><circle cx="720" cy="65" r="1"/>
    <circle cx="760" cy="35" r="1.5"/><circle cx="340" cy="85" r="1"/>
  </g>

  <!-- Sea -->
  <rect x="0" y="430" width="800" height="170" fill="url(#afsea)"/>
  <!-- Sea shimmer -->
  <g stroke="#205878" stroke-width="1" opacity="0.5" fill="none">
    <path d="M 0 448 Q 200 441 400 448 Q 600 455 800 448"/>
    <path d="M 0 470 Q 300 462 600 470 Q 720 474 800 470"/>
    <path d="M 0 498 Q 400 490 800 498"/>
  </g>
  <!-- Moon reflection -->
  <ellipse cx="650" cy="465" rx="22" ry="6" fill="#f0e8c0" opacity="0.2"/>
  <line x1="650" y1="440" x2="650" y2="520" stroke="#f0e8c0" stroke-width="2" opacity="0.1"/>

  <!-- Cliff/rocky hillside -->
  <path d="M 0 430 L 0 250 Q 20 220 60 210 Q 100 200 130 215 L 180 430 Z" fill="#1e1408"/>
  <path d="M 800 430 L 800 260 Q 775 228 740 218 Q 700 208 670 222 L 625 430 Z" fill="#1e1408"/>

  <!-- Terrace / viewpoint platform -->
  <rect x="150" y="380" width="500" height="55" fill="#241808" rx="3"/>
  <!-- Terrace railing -->
  <rect x="148" y="375" width="504" height="10" fill="#2e2010" rx="2"/>
  <g fill="#382818" stroke="#2a1c10" stroke-width="1">
    <rect x="155" y="330" width="6" height="48"/>
    <rect x="185" y="328" width="6" height="50"/>
    <rect x="215" y="326" width="6" height="52"/>
    <rect x="245" y="325" width="6" height="53"/>
    <rect x="275" y="325" width="6" height="53"/>
    <rect x="305" y="325" width="6" height="53"/>
    <rect x="335" y="325" width="6" height="53"/>
    <rect x="365" y="325" width="6" height="53"/>
    <rect x="395" y="325" width="6" height="53"/>
    <rect x="425" y="325" width="6" height="53"/>
    <rect x="455" y="326" width="6" height="52"/>
    <rect x="485" y="328" width="6" height="50"/>
    <rect x="515" y="330" width="6" height="48"/>
    <rect x="545" y="332" width="6" height="46"/>
    <rect x="575" y="334" width="6" height="44"/>
    <rect x="605" y="336" width="6" height="42"/>
    <rect x="635" y="338" width="6" height="40"/>
  </g>
  <!-- Railing top bar -->
  <rect x="148" y="325" width="500" height="8" fill="#342214" rx="2"/>

  <!-- Building with terrace behind -->
  <rect x="170" y="200" width="460" height="185" fill="#1c1208"/>
  <!-- Shuttered windows -->
  <g fill="#8b4a2a" opacity="0.8">
    <rect x="195" y="220" width="30" height="45" rx="2"/>
    <rect x="245" y="218" width="30" height="48" rx="2"/>
    <rect x="295" y="216" width="30" height="50" rx="2"/>
    <rect x="345" y="215" width="30" height="50" rx="2"/>
    <rect x="395" y="215" width="30" height="50" rx="2"/>
    <rect x="445" y="215" width="30" height="50" rx="2"/>
    <rect x="495" y="216" width="30" height="50" rx="2"/>
    <rect x="545" y="218" width="30" height="48" rx="2"/>
    <rect x="595" y="220" width="30" height="45" rx="2"/>
  </g>
  <!-- Lit windows -->
  <g fill="#f5e890" opacity="0.7">
    <rect x="197" y="222" width="12" height="20" rx="1"/>
    <rect x="211" y="222" width="12" height="20" rx="1"/>
    <rect x="297" y="218" width="12" height="22" rx="1"/>
    <rect x="311" y="218" width="12" height="22" rx="1"/>
    <rect x="447" y="217" width="12" height="22" rx="1"/>
    <rect x="461" y="217" width="12" height="22" rx="1"/>
    <rect x="597" y="222" width="12" height="20" rx="1"/>
    <rect x="611" y="222" width="12" height="20" rx="1"/>
  </g>

  <!-- Building facade details -->
  <!-- Arch doorway -->
  <path d="M 370 330 L 370 385 Q 370 395 380 395 L 420 395 Q 430 395 430 385 L 430 330 Q 430 315 400 310 Q 370 315 370 330 Z" fill="#2a1c10"/>
  <!-- Door -->
  <rect x="380" y="345" width="40" height="48" fill="#1a1008" rx="1"/>

  <!-- Lemon tree on terrace -->
  <rect x="305" y="345" width="8" height="38" fill="#2a3a18"/>
  <circle cx="309" cy="340" r="22" fill="#3a5a20"/>
  <g fill="#c8a820" opacity="0.8">
    <circle cx="300" cy="332" r="5"/>
    <circle cx="315" cy="328" r="4"/>
    <circle cx="322" cy="338" r="5"/>
    <circle cx="308" cy="325" r="4"/>
    <circle cx="296" cy="342" r="4"/>
  </g>

  <!-- Second lemon tree -->
  <rect x="485" y="348" width="8" height="35" fill="#2a3a18"/>
  <circle cx="489" cy="343" r="20" fill="#3a5a20"/>
  <g fill="#c8a820" opacity="0.8">
    <circle cx="480" cy="336" r="4"/>
    <circle cx="494" cy="332" r="5"/>
    <circle cx="498" cy="343" r="4"/>
    <circle cx="483" cy="347" r="4"/>
  </g>

  <!-- Terrace chairs -->
  <g fill="#2a1c10">
    <rect x="230" y="390" width="22" height="18" rx="2"/>
    <rect x="227" y="385" width="28" height="8" rx="2"/>
    <rect x="230" y="402" width="5" height="10"/>
    <rect x="247" y="402" width="5" height="10"/>
    <!-- Small table -->
    <circle cx="280" cy="390" r="12" fill="#2e2010"/>
    <rect x="278" y="390" width="4" height="16"/>
  </g>
  <g fill="#2a1c10">
    <rect x="545" y="390" width="22" height="18" rx="2"/>
    <rect x="542" y="385" width="28" height="8" rx="2"/>
    <rect x="545" y="402" width="5" height="10"/>
    <rect x="562" y="402" width="5" height="10"/>
    <circle cx="520" cy="390" r="12" fill="#2e2010"/>
    <rect x="518" y="390" width="4" height="16"/>
  </g>

  <!-- Colorful houses further up cliff (small) -->
  <g>
    <rect x="60" y="280" width="28" height="38" rx="1" fill="#c8783a"/>
    <rect x="92" y="272" width="28" height="45" rx="1" fill="#8b2a1a"/>
    <rect x="658" y="275" width="30" height="42" rx="1" fill="#4a80a8"/>
    <rect x="693" y="268" width="28" height="48" rx="1" fill="#d4a84c"/>
  </g>

  <!-- Boats -->
  <g fill="#0c1420">
    <path d="M 60 462 Q 95 455 130 462 Q 118 470 95 472 Q 72 470 60 462 Z"/>
    <path d="M 660 455 Q 695 447 730 455 Q 718 464 695 466 Q 672 464 660 455 Z"/>
  </g>
  <line x1="95" y1="456" x2="95" y2="440" stroke="#182030" stroke-width="2" opacity="0.6"/>
  <line x1="695" y1="448" x2="695" y2="432" stroke="#182030" stroke-width="2" opacity="0.6"/>

  <!-- Atmospheric vignette -->
  <rect x="0" y="0" width="800" height="600" fill="#060c18" opacity="0.18"/>
</svg>
