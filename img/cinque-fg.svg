<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="rfsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="35%" stop-color="#0c1832"/>
      <stop offset="65%" stop-color="#162850"/>
      <stop offset="100%" stop-color="#203868"/>
    </linearGradient>
    <linearGradient id="rfsea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#183060"/>
      <stop offset="100%" stop-color="#060810"/>
