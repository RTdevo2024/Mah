<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="vsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060812"/>
      <stop offset="30%" stop-color="#0e1630"/>
      <stop offset="60%" stop-color="#1a2850"/>
      <stop offset="100%" stop-color="#243868"/>
    </linearGradient>
    <linearGradient id="vwater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162244"/>
      <stop offset="100%" stop-color="#080c1a"/>
    </linearGradient>
    <radialGradient id="vmoon" cx="25%" cy="18%" r="18%">
      <stop offset="0%" stop-color="#f0e8c0" stop-opacity="1"/>
      <stop offset="50%" stop-color="#c0a84c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#060812" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="800" fill="url(#vsky)"/>
  <!-- Moon glow -->
  <ellipse cx="300" cy="145" rx="160" ry="100" fill="url(#vmoon)"/>
  <circle cx="300" cy="130" r="38" fill="#f0e8c0" opacity="0.93"/>
  <circle cx="300" cy="130" r="30" fill="#fffbe8"/>

  <!-- Stars -->
  <g fill="#e8f0ff" opacity="0.5">
    <circle cx="80" cy="55" r="1.5"/><circle cx="160" cy="28" r="1"/><circle cx="500" cy="45" r="2"/>
    <circle cx="620" cy="30" r="1"/><circle cx="720" cy="65" r="1.5"/><circle cx="830" cy="40" r="1"/>
    <circle cx="920" cy="25" r="1.5"/><circle cx="1050" cy="55" r="1"/><circle cx="1140" cy="30" r="2"/>
    <circle cx="440" cy="90" r="1"/><circle cx="680" cy="110" r="1.5"/><circle cx="870" cy="100" r="1"/>
    <circle cx="1000" cy="80" r="1.5"/><circle cx="1100" cy="100" r="1"/>
  </g>

  <!-- Canal water -->
  <rect x="0" y="520" width="1200" height="280" fill="url(#vwater)"/>

  <!-- Moon reflection on water -->
  <path d="M 250 530 Q 300 545 350 530 Q 320 570 300 600 Q 280 570 250 530 Z" fill="#c9a84c" opacity="0.2"/>
  <line x1="300" y1="525" x2="300" y2="680" stroke="#c9a84c" stroke-width="3" opacity="0.12"/>

  <!-- Ripple lines -->
  <g stroke="#2a3a6a" stroke-width="1" opacity="0.5">
    <path d="M 0 545 Q 200 538 400 545 Q 600 552 800 545 Q 1000 538 1200 545"/>
    <path d="M 0 565 Q 200 558 400 565 Q 600 572 800 565 Q 1000 558 1200 565"/>
    <path d="M 0 588 Q 250 580 500 588 Q 750 596 1000 588 Q 1100 584 1200 588"/>
    <path d="M 0 615 Q 300 607 600 615 Q 900 623 1200 615"/>
    <path d="M 0 648 Q 400 640 800 648 Q 1000 652 1200 648"/>
  </g>

  <!-- Building reflections in water (blurry) -->
  <g opacity="0.3">
    <rect x="50" y="530" width="60" height="120" fill="#1e2a50" rx="2"/>
    <rect x="120" y="545" width="45" height="100" fill="#182040" rx="2"/>
    <rect x="175" y="535" width="70" height="110" fill="#1a2848" rx="2"/>
    <rect x="400" y="530" width="80" height="130" fill="#1e2a50" rx="2"/>
    <rect x="490" y="545" width="55" height="110" fill="#182040" rx="2"/>
    <rect x="700" y="528" width="90" height="140" fill="#1a2848" rx="2"/>
    <rect x="800" y="540" width="65" height="115" fill="#1e2a50" rx="2"/>
    <rect x="950" y="532" width="75" height="125" fill="#182040" rx="2"/>
    <rect x="1040" y="545" width="50" height="105" fill="#1a2848" rx="2"/>
    <rect x="1100" y="535" width="80" height="115" fill="#182040" rx="2"/>
  </g>

  <!-- Rialto Bridge -->
  <path d="M 480 520 L 500 470 Q 550 440 600 430 Q 650 440 700 470 L 720 520 Z" fill="#141c38"/>
  <!-- Bridge arch -->
  <path d="M 520 520 Q 600 460 680 520" fill="none" stroke="#1e2a50" stroke-width="3"/>
  <!-- Bridge shops -->
  <rect x="525" y="460" width="150" height="55" fill="#0e1628"/>
  <!-- Bridge windows -->
  <g fill="#c9a84c" opacity="0.35">
    <rect x="540" y="470" width="10" height="20" rx="5"/>
    <rect x="560" y="470" width="10" height="20" rx="5"/>
    <rect x="580" y="468" width="10" height="20" rx="5"/>
    <rect x="600" y="467" width="10" height="20" rx="5"/>
    <rect x="620" y="468" width="10" height="20" rx="5"/>
    <rect x="640" y="470" width="10" height="20" rx="5"/>
    <rect x="660" y="470" width="10" height="20" rx="5"/>
  </g>

  <!-- Buildings left bank -->
  <g fill="#0e1428">
    <rect x="0" y="330" width="80" height="190" rx="2"/>
    <rect x="85" y="290" width="60" height="230" rx="2"/>
    <rect x="150" y="340" width="90" height="180" rx="2"/>
    <rect x="245" y="310" width="70" height="210" rx="2"/>
    <rect x="320" y="350" width="55" height="170" rx="2"/>
    <rect x="380" y="320" width="85" height="200" rx="2"/>
    <rect x="470" y="360" width="50" height="160" rx="2"/>
  </g>

  <!-- Buildings right bank -->
  <g fill="#0c1226">
    <rect x="730" y="345" width="75" height="175" rx="2"/>
    <rect x="810" y="305" width="65" height="215" rx="2"/>
    <rect x="880" y="330" width="90" height="190" rx="2"/>
    <rect x="975" y="295" width="55" height="225" rx="2"/>
    <rect x="1035" y="340" width="80" height="180" rx="2"/>
    <rect x="1120" y="320" width="80" height="200" rx="2"/>
  </g>

  <!-- Domed church (Santa Maria della Salute) -->
  <path d="M 900 330 L 890 290 Q 950 230 1010 290 L 1000 330 Z" fill="#121a38"/>
  <ellipse cx="950" cy="260" rx="38" ry="50" fill="#0e1630"/>
  <path d="M 940 220 L 950 190 L 960 220" fill="#0a1228"/>
  <rect x="946" y="185" width="8" height="15" fill="#0a1228"/>
  <!-- Drum windows on dome -->
  <g fill="#1e2a50" opacity="0.6">
    <rect x="918" y="255" width="8" height="15" rx="4"/>
    <rect x="937" y="248" width="8" height="15" rx="4"/>
    <rect x="956" y="248" width="8" height="15" rx="4"/>
    <rect x="975" y="255" width="8" height="15" rx="4"/>
  </g>

  <!-- Lit windows on buildings -->
  <g fill="#c9a84c" opacity="0.5">
    <rect x="20" y="360" width="12" height="18" rx="2"/>
    <rect x="42" y="375" width="12" height="18" rx="2"/>
    <rect x="95" y="320" width="12" height="18" rx="2"/>
    <rect x="120" y="345" width="12" height="18" rx="2"/>
    <rect x="168" y="370" width="12" height="18" rx="2"/>
    <rect x="260" y="335" width="12" height="18" rx="2"/>
    <rect x="285" y="360" width="12" height="18" rx="2"/>
    <rect x="750" y="370" width="12" height="18" rx="2"/>
    <rect x="825" y="330" width="12" height="18" rx="2"/>
    <rect x="850" y="355" width="12" height="18" rx="2"/>
    <rect x="895" y="358" width="12" height="18" rx="2"/>
    <rect x="1000" y="318" width="12" height="18" rx="2"/>
    <rect x="1050" y="365" width="12" height="18" rx="2"/>
    <rect x="1135" y="345" width="12" height="18" rx="2"/>
  </g>

  <!-- Gondola in foreground -->
  <path d="M 200 530 Q 260 522 320 530 Q 340 535 380 528 L 400 535 Q 360 545 320 542 Q 270 548 230 542 Q 200 545 180 538 Z" fill="#050810"/>
  <!-- Gondola prow -->
  <path d="M 380 528 Q 405 520 415 528 Q 408 535 400 535 Z" fill="#050810"/>
  <!-- Gondolier -->
  <rect x="340" y="508" width="8" height="24" fill="#080c18"/>
  <circle cx="344" cy="505" r="5" fill="#0a0e1c"/>
  <!-- Oar -->
  <line x1="348" y1="508" x2="385" y2="540" stroke="#1a2440" stroke-width="2"/>

  <!-- Street lantern reflections -->
  <g opacity="0.25">
    <line x1="140" y1="525" x2="140" y2="620" stroke="#c9a84c" stroke-width="3"/>
    <line x1="460" y1="525" x2="460" y2="640" stroke="#c9a84c" stroke-width="3"/>
    <line x1="760" y1="525" x2="760" y2="640" stroke="#c9a84c" stroke-width="3"/>
    <line x1="1060" y1="525" x2="1060" y2="620" stroke="#c9a84c" stroke-width="3"/>
  </g>

  <!-- Atmospheric vignette -->
  <rect x="0" y="0" width="1200" height="800" fill="#060812" opacity="0.2"/>
</svg>
