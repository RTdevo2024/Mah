    <circle cx="800" cy="55" r="1.5"/><circle cx="920" cy="28" r="1"/><circle cx="1020" cy="52" r="2"/>
    <circle cx="1100" cy="30" r="1.5"/><circle cx="1160" cy="72" r="1"/><circle cx="310" cy="90" r="1"/>
    <circle cx="440" cy="105" r="1.5"/><circle cx="700" cy="95" r="1"/><circle cx="850" cy="88" r="1.5"/>
