    <rect x="446" y="260" width="34" height="78" rx="1" fill="#4a80a8"/>
    <rect x="484" y="252" width="38" height="78" rx="1" fill="#d4a84c"/>
    <rect x="526" y="248" width="36" height="82" rx="1" fill="#c8b060"/>
