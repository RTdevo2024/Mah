    <rect x="510" y="412" width="7" height="10" rx="1"/><rect x="595" y="416" width="7" height="10" rx="1"/>
    <rect x="680" y="428" width="7" height="10" rx="1"/><rect x="762" y="442" width="7" height="10" rx="1"/>
    <!-- Top levels -->
