    <rect x="456" y="406" width="42" height="78" rx="1" fill="#4a80a8"/>
    <rect x="502" y="400" width="40" height="78" rx="1" fill="#c8b060"/>
    <rect x="546" y="402" width="38" height="78" rx="1" fill="#e84a3a"/>
    <rect x="588" y="406" width="42" height="76" rx="1" fill="#c8783a"/>
