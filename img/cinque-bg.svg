    <rect x="534" y="262" width="7" height="10" rx="1"/><rect x="574" y="264" width="7" height="10" rx="1"/>
    <rect x="612" y="270" width="7" height="10" rx="1"/><rect x="690" y="285" width="7" height="10" rx="1"/>
