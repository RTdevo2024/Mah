<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="cqsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="30%" stop-color="#0e1838"/>
      <stop offset="60%" stop-color="#1a3060"/>
      <stop offset="100%" stop-color="#244880"/>
    </linearGradient>
    <linearGradient id="cqsea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3868"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <radialGradient id="cqmoon" cx="20%" cy="15%" r="18%">
      <stop offset="0%" stop-color="#f0e8c0" stop-opacity="1"/>
      <stop offset="55%" stop-color="#a89040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#060810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cqrock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#251c10"/>
      <stop offset="100%" stop-color="#160e06"/>
