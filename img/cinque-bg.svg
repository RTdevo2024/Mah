    <path d="M 1020 585 Q 1060 577 1100 585 Q 1086 595 1060 597 Q 1034 595 1020 585 Z"/>
    <path d="M 580 615 Q 610 607 640 615 Q 628 624 610 626 Q 592 624 580 615 Z"/>
    <path d="M 380 628 Q 408 620 436 628 Q 424 638 408 640 Q 392 638 380 628 Z"/>
    <path d="M 720 622 Q 748 614 776 622 Q 764 632 748 634 Q 732 632 720 622 Z"/>
