    <rect x="720" y="496" width="38" height="66" rx="1" fill="#d4a84c"/>
    <rect x="762" y="504" width="42" height="58" rx="1" fill="#4a80a8"/>
    <rect x="808" y="512" width="38" height="50" rx="1" fill="#e84a3a"/>
    <rect x="850" y="520" width="40" height="42" rx="1" fill="#c8b060"/>
