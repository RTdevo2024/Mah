    <rect x="258" y="484" width="8" height="12" rx="1"/><rect x="271" y="484" width="8" height="12" rx="1"/>
    <rect x="350" y="482" width="8" height="12" rx="1"/><rect x="363" y="482" width="8" height="12" rx="1"/>
