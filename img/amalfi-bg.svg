    <path d="M 0 585 Q 400 577 800 585 Q 1000 589 1200 585"/>
    <path d="M 0 615 Q 500 607 1000 615 Q 1100 619 1200 615"/>
    <path d="M 0 648 Q 600 640 1200 648"/>
  </g>

  <!-- Cliff face -->
  <path d="M 0 800 L 0 420 Q 50 380 120 360 Q 180 345 240 350 L 280 540 L 0 540 Z" fill="url(#acliff)"/>
  <path d="M 1200 800 L 1200 460 Q 1150 420 1080 400 Q 1020 385 960 395 L 920 540 L 1200 540 Z" fill="url(#acliff)"/>

  <!-- Main cliff/hillside with houses -->
