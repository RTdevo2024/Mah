<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="asky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060c1c"/>
      <stop offset="35%" stop-color="#0e2044"/>
      <stop offset="65%" stop-color="#184870"/>
      <stop offset="100%" stop-color="#206090"/>
    </linearGradient>
    <linearGradient id="asea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5070"/>
      <stop offset="50%" stop-color="#0e2a48"/>
      <stop offset="100%" stop-color="#06101e"/>
    </linearGradient>
    <radialGradient id="amoon" cx="75%" cy="18%" r="16%">
      <stop offset="0%" stop-color="#f0e8c0" stop-opacity="1"/>
      <stop offset="55%" stop-color="#c0a050" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#060c1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="acliff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1c10"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="800" fill="url(#asky)"/>

  <!-- Moon glow -->
  <ellipse cx="900" cy="145" rx="150" ry="95" fill="url(#amoon)"/>
  <circle cx="900" cy="130" r="36" fill="#f0e8c0" opacity="0.93"/>
  <circle cx="900" cy="130" r="28" fill="#fffbe8"/>

  <!-- Stars -->
  <g fill="#e8f0ff" opacity="0.55">
    <circle cx="50" cy="55" r="2"/><circle cx="130" cy="28" r="1.5"/><circle cx="220" cy="72" r="1"/>
    <circle cx="310" cy="38" r="1.5"/><circle cx="420" cy="20" r="2"/><circle cx="530" cy="60" r="1"/>
    <circle cx="620" cy="35" r="1.5"/><circle cx="710" cy="55" r="1"/><circle cx="1020" cy="48" r="1.5"/>
    <circle cx="1080" cy="22" r="1"/><circle cx="1150" cy="68" r="2"/><circle cx="1000" cy="95" r="1"/>
    <circle cx="160" cy="120" r="1"/><circle cx="360" cy="105" r="1.5"/><circle cx="580" cy="95" r="1"/>
  </g>

  <!-- Sea -->
  <rect x="0" y="540" width="1200" height="260" fill="url(#asea)"/>

  <!-- Moon reflection on sea -->
  <path d="M 860 550 Q 900 560 940 550 Q 920 600 900 640 Q 880 600 860 550 Z" fill="#c9a84c" opacity="0.18"/>
  <line x1="900" y1="545" x2="900" y2="700" stroke="#c9a84c" stroke-width="4" opacity="0.1"/>

  <!-- Sea shimmer -->
  <g stroke="#2a5080" stroke-width="1.5" opacity="0.5" fill="none">
