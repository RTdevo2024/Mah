    <path d="M 950 565 Q 990 557 1030 565 Q 1015 573 990 575 Q 965 573 950 565 Z"/>
    <path d="M 550 590 Q 580 582 610 590 Q 598 598 580 600 Q 562 598 550 590 Z"/>
