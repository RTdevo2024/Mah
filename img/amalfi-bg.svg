  <!-- Lemon trees (suggestion) -->
  <g fill="#2a4a1a" opacity="0.7">
    <circle cx="130" cy="360" r="25"/>
    <circle cx="1060" cy="370" r="28"/>
    <circle cx="1090" cy="355" r="20"/>
